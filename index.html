<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexiria | Nanoparticle Drug Delivery Simulator</title>
    <meta name="description" content="A scientific simulation of nanoparticle cancer drug delivery comparing random vs. guided strategies.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">⚛️</span>
                <h1>Nexiria <span class="subtitle">BioSim v1.0</span></h1>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <span class="label">System:</span>
                    <span class="value" id="system-status">Idle</span>
                </div>
                <div class="status-item">
                    <span class="label">Mode:</span>
                    <span class="value" id="current-mode-display">Guided + Triggered</span>
                </div>
            </div>
        </header>

        <main class="dashboard">
            <aside class="sidebar">
                <section class="panel controls">
                    <h2>Simulation Controls</h2>
                    <div class="control-group">
                        <button id="start-btn" class="btn primary">Start Simulation</button>
                        <button id="reset-btn" class="btn secondary">Reset</button>
                    </div>
                    <div class="control-group">
                        <label>Delivery Strategy</label>
                        <div class="segmented-control">
                            <button type="button" id="mode-random" class="segment" onclick="window.sim.setMode('random')">Random</button>
                            <button type="button" id="mode-guided" class="segment active" onclick="window.sim.setMode('guided')">Guided</button>
                        </div>
                    </div>
                </section>

                <section class="panel metrics">
                    <h2>Real-time Metrics</h2>
                    <div class="metric-card">
                        <span class="metric-label">Delivery Efficiency</span>
                        <div class="metric-value-container">
                            <span class="metric-value" id="efficiency">0.0%</span>
                            <div class="progress-bar-bg">
                                <div id="efficiency-bar" class="progress-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Off-Target Exposure</span>
                        <div class="metric-value-container">
                            <span class="metric-value danger" id="off-target">0.0</span>
                            <span class="metric-unit">Units</span>
                        </div>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Particles in Tumor</span>
                        <div class="metric-value-container">
                            <span class="metric-value" id="particles-count">0</span>
                            <span class="metric-unit">/ 100</span>
                        </div>
                    </div>
                </section>

                <section class="panel legends">
                    <h2>Visual Legend</h2>
                    <div class="legend-item">
                        <span class="dot tumor"></span>
                        <span>Tumor Region</span>
                    </div>
                    <div class="legend-item">
                        <span class="dot particle"></span>
                        <span>Nanoparticle</span>
                    </div>
                    <div class="legend-item">
                        <span class="dot drug"></span>
                        <span>Drug Payload</span>
                    </div>
                </section>
            </aside>

            <div class="simulation-view">
                <div class="canvas-container" id="canvas-container">
                    <canvas id="sim-canvas"></canvas>
                    <div class="overlay-labels">
                        <div class="label-box" id="label-tumor">Tumor Region</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="simulation.js"></script>
</body>
</html>

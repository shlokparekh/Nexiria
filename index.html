<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexiria | Advanced Prototype v5.0</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="operating-mode">
    <canvas id="nexiria-viewport"></canvas>

    <div id="clinical-hud">
        <div class="hud-top-left">
            <div class="system-id">NEXIRIA_OPERATING_SYSTEM_v5.0.2</div>
            <div class="status-indicator"><span class="pulse-dot"></span> SYSTEM_LIVE: MONITORING_MODE</div>
        </div>

        <div class="hud-top-right">
            <div class="clock-feed" id="hud-clock">00:00:00</div>
            <div class="mode-indicator" id="val-mode">STRATEGY: INTELLIGENT_NEXIRIA</div>
        </div>

        <!-- TELEMETRY FEED -->
        <div class="hud-bottom-left">
            <div class="metric-row"><span class="m-label">DORMANT_NODES</span><span class="m-value" id="val-dormant">0</span></div>
            <div class="metric-row"><span class="m-label">VERIFYING</span><span class="m-value" id="val-verifying" style="color: #ffff64">0</span></div>
            <div class="metric-row"><span class="m-label">INTERVENING</span><span class="m-value" id="val-active" style="color: #00ff88">0</span></div>
            <div class="metric-row"><span class="m-label">BIODEGRADED</span><span class="m-value" id="val-degraded">0</span></div>
        </div>

        <div class="hud-bottom-right">
            <div class="metric-row"><span class="m-label">SYNC_STABILITY</span><span class="m-value" id="val-sync">0.0%</span></div>
            <div class="metric-row"><span class="m-label">CONFIDENCE_AVG</span><span class="m-value" id="val-confidence">0.0%</span></div>
            <div class="metric-row"><span class="m-label">OFF_TARGET_EXP</span><span class="m-value safe" id="val-exposure">0.00%</span></div>
        </div>
    </div>

    <!-- INSPECTION PANEL -->
    <div id="inspection-panel" class="side-panel">
        <div class="panel-header">CELL_INSPECTION_DATA</div>
        <div class="panel-content" id="inspection-data">
            <p class="text-dim">Select a cellular entity to begin analysis...</p>
        </div>
        <button class="close-panel" id="close-inspection">CLOSE_DATA_FEED</button>
    </div>

    <!-- MANUAL CONTROL DECK -->
    <div id="control-deck">
        <div class="control-group">
            <button id="btn-spawn">SPAWN_ANOMALY</button>
            <button id="btn-inject">INJECT_NODES</button>
            <button id="btn-mode">TOGGLE_PASSIVE</button>
        </div>
        <div class="control-group">
            <div class="slider-box">
                <label>HYPOXIA_SIG</label>
                <input type="range" id="slider-hypoxia" min="0" max="100" value="70">
            </div>
            <div class="slider-box">
                <label>ENZYME_LVL</label>
                <input type="range" id="slider-enzyme" min="0" max="100" value="85">
            </div>
            <button id="btn-focus" class="active">AUTO_FOCUS: ON</button>
        </div>
    </div>

    <!-- OVERLAYS -->
    <div id="focus-overlay" class="focus-vignette"></div>
    <div class="overlay-vignette"></div>
    <div class="overlay-grain"></div>

    <script src="simulation.js"></script>
</body>
</html>
